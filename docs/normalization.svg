<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0f0c"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/></filter>
    <style>
      .title{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .head{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#fff}
      .text{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#d1d5db}
      .tag{font:700 18px 'Segoe UI',Arial,sans-serif;fill:#86efac}
      .small{font:600 16px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="60" y="70" class="title">Normalization Process</text>

  <g filter="url(#shadow)">
    <rect x="70" y="150" width="360" height="560" rx="28" fill="url(#card)" stroke="#f59e0b" stroke-width="2"/>
    <text x="100" y="200" class="head">原始資料（CSV）</text>
    <text x="100" y="245" class="tag">問題</text>
    <text x="100" y="285" class="text">- 歌曲、藝人、專輯、播放清單資訊混在一起</text>
    <text x="100" y="320" class="text">- 音樂特徵與歌曲主資料耦合</text>
    <text x="100" y="355" class="text">- 使用者行為無法獨立分析</text>
    <text x="100" y="390" class="text">- 容易造成欄位重複與更新異常</text>
    <text x="100" y="455" class="tag">資料來源</text>
    <text x="100" y="495" class="text">- Jazz_playlist_tracks.csv</text>
    <text x="100" y="530" class="text">- Jazz_playlist_tracks_data.csv</text>
    <text x="100" y="565" class="text">- Jazz_playlist_data.csv</text>
    <text x="100" y="630" class="small">目標：將原始資料拆解成可查詢、可關聯、可分析的結構。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="110" width="360" height="210" rx="28" fill="url(#card)" stroke="#22c55e" stroke-width="2"/>
    <text x="550" y="160" class="head">第一正規化（1NF）</text>
    <text x="550" y="205" class="text">- 每個欄位保持原子性</text>
    <text x="550" y="240" class="text">- 一筆資料只描述一個明確欄位值</text>
    <text x="550" y="275" class="text">- 把複合資訊拆開成獨立屬性</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="365" width="360" height="210" rx="28" fill="url(#card)" stroke="#22c55e" stroke-width="2"/>
    <text x="550" y="415" class="head">第二正規化（2NF）</text>
    <text x="550" y="460" class="text">- 移除部分相依</text>
    <text x="550" y="495" class="text">- 將 Songs / Artists / Albums 分離</text>
    <text x="550" y="530" class="text">- 多對多關係改由關聯表處理</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="620" width="360" height="210" rx="28" fill="url(#card)" stroke="#22c55e" stroke-width="2"/>
    <text x="550" y="670" class="head">第三正規化（3NF）</text>
    <text x="550" y="715" class="text">- 移除遞移相依</text>
    <text x="550" y="750" class="text">- Audio_Features、User_Behavior 獨立</text>
    <text x="550" y="785" class="text">- Playlists 與 Song_Playlist 分離</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="980" y="150" width="330" height="560" rx="28" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="1010" y="200" class="head">正規化後成果</text>
    <text x="1010" y="250" class="text">- Artists</text>
    <text x="1010" y="285" class="text">- Albums</text>
    <text x="1010" y="320" class="text">- Songs</text>
    <text x="1010" y="355" class="text">- Song_Album</text>
    <text x="1010" y="390" class="text">- Audio_Features</text>
    <text x="1010" y="425" class="text">- User_Behavior</text>
    <text x="1010" y="460" class="text">- Playlists</text>
    <text x="1010" y="495" class="text">- Song_Playlist</text>
    <text x="1010" y="565" class="tag">效益</text>
    <text x="1010" y="605" class="text">- 減少重複資料</text>
    <text x="1010" y="640" class="text">- 提高資料一致性</text>
    <text x="1010" y="675" class="text">- 支援 JOIN 與聚合分析</text>
    <text x="1010" y="710" class="text">- 容易延伸推薦系統</text>
  </g>

  <line x1="430" y1="430" x2="520" y2="215" stroke="#93c5fd" stroke-width="5"/>
  <line x1="430" y1="430" x2="520" y2="470" stroke="#93c5fd" stroke-width="5"/>
  <line x1="430" y1="430" x2="520" y2="725" stroke="#93c5fd" stroke-width="5"/>
  <line x1="880" y1="215" x2="980" y2="280" stroke="#86efac" stroke-width="5"/>
  <line x1="880" y1="470" x2="980" y2="430" stroke="#86efac" stroke-width="5"/>
  <line x1="880" y1="725" x2="980" y2="580" stroke="#86efac" stroke-width="5"/>

  <text x="610" y="95" class="small">由原始 CSV 到可分析的 relational database</text>
</svg>
